name: DevOps Automation Pipeline

# Alarm: Pipeline ini akan berjalan otomatis SETIAP ADA PUSH ke branch main
on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    # Menyewa komputer virtual berbasis Linux (Ubuntu) milik GitHub
    runs-on: ubuntu-latest

    steps:
    # 1. Ambil kode terbaru dari repositori GitHub
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Siapkan lingkungan Node.js di komputer virtual untuk testing awal
    - name: Setup Node.js Environment
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 3. Lakukan simulasi build Docker secara otomatis
    - name: Build Docker Image Test
      run: |
        docker build -t belajar-devops-app:latest .
        echo "Skenario Baik: Docker sukses membungkus aplikasi tanpa eror!"